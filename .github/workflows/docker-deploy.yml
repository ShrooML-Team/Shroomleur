name: Build and Deploy Docker

on:
    push:
        branches: [master, main]
        tags: ["v*"]
    pull_request:
        branches: [master, main]

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    test:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:15-alpine
                env:
                    POSTGRES_DB: shroomleur_test
                    POSTGRES_USER: shroomleur
                    POSTGRES_PASSWORD: shroomleur
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python 3.11
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"

            - name: Cache pip dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.cache/pip
                  key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
                  restore-keys: |
                      ${{ runner.os }}-pip-

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -e ".[dev]"

            - name: Run tests
              env:
                  DATABASE_URL: postgresql://shroomleur:shroomleur@localhost:5432/shroomleur_test
                  SECRET_KEY: test-secret-key-for-ci
                  ALGORITHM: HS256
                  ACCESS_TOKEN_EXPIRE_MINUTES: 30
              run: |
                  if [ -f pytest.ini ] || [ -d tests ]; then
                    pytest -v
                  else
                    echo "Aucun test trouvé, passage des tests"
                  fi

    build-and-push:
        needs: test
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Log in to Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  platforms: linux/amd64,linux/arm64
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy:
        needs: build-and-push
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Update files with new tag
              if: startsWith(github.ref, 'refs/tags/v')
              run: |
                  TAG_NAME=${GITHUB_REF#refs/tags/}
                  echo "Mise à jour avec le tag: $TAG_NAME"

                  sed -i "s|\${IMAGE_TAG:-.*}|\${IMAGE_TAG:-$TAG_NAME}|" docker-compose.yml

                  echo "docker-compose.yml mis à jour : $(grep 'IMAGE_TAG:-' docker-compose.yml)"

            - name: Commit updated files
              if: startsWith(github.ref, 'refs/tags/v')
              run: |
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"
                  git add docker-compose.yml
                  git commit -m "🤖 Auto-update to ${GITHUB_REF#refs/tags/}" || exit 0
                  git push origin HEAD:master || echo "Pas de changements à pousser"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Deploy notification
              run: |
                  echo "🚀 Image Docker déployée avec succès!"
                  echo "📦 Registry: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
                  echo "🏷️  Tag: ${GITHUB_REF#refs/tags/}"

            # Exemple de déploiement vers un serveur distant (à décommenter et configurer)
            # - name: Deploy to server
            #   uses: appleboy/ssh-action@v1.0.0
            #   with:
            #     host: ${{ secrets.HOST }}
            #     username: ${{ secrets.USERNAME }}
            #     key: ${{ secrets.SSH_KEY }}
            #     script: |
            #       docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            #       docker compose -f /path/to/docker-compose.yml up -d --no-build

    create-release:
        needs: build-and-push
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/v')
        permissions:
            contents: write

        steps:
            - name: Set lowercase repository name
              run: echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v1
              with:
                  generate_release_notes: true
                  body: |
                      🚀 **Nouvelle version de Shroomleur !**

                      📦 **Image Docker disponible :**
                      ```bash
                      docker pull ghcr.io/${{ env.REPO_LOWER }}:${{ github.ref_name }}
                      docker pull ghcr.io/${{ env.REPO_LOWER }}:latest
                      ```

                      🔄 **Changements inclus dans cette version :**
                      Voir les notes générées automatiquement ci-dessous.
